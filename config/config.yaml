# ── Data ──────────────────────────────────────────────────────────────────────
data:
  raw_data_path: "D:\\Anomaly Detection\\data\\data.csv"
  test_size: 0.2
  random_state: 42
  # ── Features ──────────────────────────────────────────────────────────────────
features:
  target_column: "Machine failure"
  drop_columns: ["UDI", "Product ID"]
  categorical_columns: ["Type"]
  numerical_columns:
    - "Air temperature [K]"
    - "Process temperature [K]"
    - "Rotational speed [rpm]"
    - "Torque [Nm]"
    - "Tool wear [min]"
    # ── Model ─────────────────────────────────────────────────────────────────────
model:
  random_forest:
    n_estimators: 200
    max_depth: 10
    min_samples_split: 5
    random_state: 42
    n_jobs: -1
  isolation_forest:
    n_estimators: 200
    contamination: 0.03
    random_state: 42
    # ── Artifacts ─────────────────────────────────────────────────────────────────
artifacts:
  model_path: "artifacts/model.pkl"
  scaler_path: "artifacts/scaler.pkl"
  encoder_path: "artifacts/encoder.pkl"

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  log_file: "logs/pipeline.log"
  level: "INFO"